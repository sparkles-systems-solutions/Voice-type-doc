<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilshan's Smart Meeting Assistant</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #333; font-size: 24px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .status-box { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; transition: 0.3s; }
        .active { background: #e6f4ea; color: #1e8e3e; border-left: 5px solid #1e8e3e; }
        .idle { background: #fce8e6; color: #d93025; border-left: 5px solid #d93025; }
        #output { 
            width: 100%; min-height: 450px; padding: 20px; border: 1px solid #ddd; 
            border-radius: 10px; background: #fff; font-size: 18px; line-height: 1.8;
            overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; outline: none;
        }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: #5f6368; color: white; }
        .btn-copy { background: #34a853; color: white; }
        .btn-clear { background: #d93025; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Meeting Transcript <small style="font-size: 12px; font-weight: normal;">(Singlish + English Support)</small></h1>
    
    <div id="status" class="status-box idle">Status: Ready to assist</div>

    <div class="toolbar">
        <button id="startBtn" class="btn-start">Start Assistant</button>
        <button id="stopBtn" class="btn-stop" disabled>Stop Recording</button>
        <button id="copyBtn" class="btn-copy">Copy for Gemini</button>
        <button id="clearBtn" class="btn-clear">Clear All</button>
    </div>

    <div id="output" contenteditable="true" placeholder="Meeting text will appear here automatically..."></div>
</div>

<script>
    const output = document.getElementById('output');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    let recognition;
    let isRecording = false;

    // Load saved data on startup
    if (localStorage.getItem('saved_transcript')) {
        output.innerText = localStorage.getItem('saved_transcript');
    }

    if (!('webkitSpeechRecognition' in window)) {
        alert("Please use Google Chrome for this tool to work!");
    } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US'; // Singlish weda karanne English mode ekedi phonetically

        recognition.onstart = () => {
            isRecording = true;
            status.innerText = "Status: ACTIVE & LISTENING...";
            status.className = "status-box active";
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                }
            }
            if (finalTranscript) {
                output.innerText += finalTranscript;
                localStorage.setItem('saved_transcript', output.innerText);
                output.scrollTop = output.scrollHeight;
            }
        };

        recognition.onend = () => {
            // Smart Restart: Katha nokara hitiyoth hari, error ekak awoth hari restart karanawa
            if (isRecording) {
                console.log("Restarting to keep connection alive...");
                recognition.start();
            } else {
                status.innerText = "Status: Stopped";
                status.className = "status-box idle";
            }
        };

        recognition.onerror = (event) => {
            console.error("Speech Recognition Error:", event.error);
            if (event.error === 'no-speech') {
                console.log("No speech detected, keep waiting...");
            }
        };
    }

    startBtn.onclick = () => {
        isRecording = true;
        recognition.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
        isRecording = false;
        recognition.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    copyBtn.onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        alert("Copied! Paste this to Gemini to generate minutes.");
    };

    clearBtn.onclick = () => {
        if(confirm("Are you sure? This will delete the entire transcript.")) {
            output.innerText = "";
            localStorage.removeItem('saved_transcript');
        }
    };
</script>

</body>
</html>
