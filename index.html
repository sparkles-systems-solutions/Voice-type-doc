<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meeting Assistant - Dilshan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #bb86fc; text-align: center; font-size: 22px; }
        .status { padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; font-weight: bold; background: #333; }
        .recording { border: 1px solid #03dab6; color: #03dab6; box-shadow: 0 0 10px rgba(3, 218, 182, 0.2); }
        #output { 
            width: 100%; min-height: 400px; padding: 15px; border: 1px solid #444; 
            border-radius: 8px; background: #252525; font-size: 18px; line-height: 1.8;
            overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; outline: none;
        }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        button { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .start { background: #bb86fc; color: #000; }
        .copy { background: #03dab6; color: #000; }
        .clear { background: #cf6679; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>SMART TRANSCRIPT ENGINE v2</h1>
    <div id="status" class="status">System Ready</div>
    
    <div class="controls">
        <button id="startBtn" class="start">START ENGINE</button>
        <button id="copyBtn" class="copy">COPY FOR MINUTES</button>
        <button id="clearBtn" class="clear">CLEAR</button>
    </div>

    <div id="output" contenteditable="true">Listening for Sinhala & English...</div>
</div>

<script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    
    let recognition;
    let isActive = false;

    if (!('webkitSpeechRecognition' in window)) {
        alert("Chrome Browser Required");
    } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        // Basha dekama pick karanna 'en-IN' (Indian English) godak welawata 'en-US' ta wada Sinhala acccent ekata galapenawa
        recognition.lang = 'en-IN'; 

        recognition.onstart = () => {
            isActive = true;
            status.innerText = "ENGINE RUNNING...";
            status.className = "status recording";
        };

        recognition.onresult = (event) => {
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    final += event.results[i][0].transcript + '. ';
                }
            }
            if (final) {
                output.innerText += final;
                // Scroll to bottom
                window.scrollTo(0, document.body.scrollHeight);
            }
        };

        recognition.onerror = (e) => {
            console.log("Recognition Error: ", e.error);
        };

        recognition.onend = () => {
            // MEKA THAMA SMART RESTART EKA:
            // Mic eka disable unoth auto-detect karala 100ms walin aith on karanawa
            if (isActive) {
                console.log("Auto-Restarting...");
                recognition.start();
            }
        };
    }

    startBtn.onclick = () => {
        if (!isActive) {
            recognition.start();
            startBtn.innerText = "STOP ENGINE";
        } else {
            isActive = false;
            recognition.stop();
            startBtn.innerText = "START ENGINE";
            status.className = "status";
            status.innerText = "System Stopped";
        }
    };

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        alert("Copied!");
    };

    document.getElementById('clearBtn').onclick = () => {
        if(confirm("Clear transcript?")) output.innerText = "";
    };
</script>
</body>
</html>
