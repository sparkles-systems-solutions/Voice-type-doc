<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Dilshan's Hybrid Meeting Assistant</title>
    <style>
        :root { --main: #6366f1; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        .status-box { background: #020617; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; border-left: 4px solid var(--main); }
        #output { 
            width: 100%; min-height: 450px; background: #0f172a; border: 1px solid #475569; 
            border-radius: 10px; padding: 20px; font-size: 19px; line-height: 1.8; overflow-y: auto; outline: none;
        }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--main); color: white; }
        .btn-lang { background: #334155; color: white; border: 1px solid var(--main); }
        .active-lang { background: var(--main) !important; box-shadow: 0 0 10px var(--main); }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-box">Status: Stopped</div>

    <div class="controls">
        <button id="startBtn" class="btn-start">ACTIVATE ENGINE</button>
        <button id="langSi" class="btn-lang active-lang">SINHALA MODE</button>
        <button id="langEn" class="btn-lang">ENGLISH MODE</button>
        <button id="copyBtn" style="background: #10b981; color: white; margin-left: auto;">COPY TEXT</button>
    </div>

    <div id="output" contenteditable="true" placeholder="කතා කරන දේ මෙතන දිස්වේවි..."></div>
</div>

<script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    
    let recognition;
    let isRunning = false;
    let currentLang = 'si-LK';

    if (!('webkitSpeechRecognition' in window)) {
        alert("Chrome Browser Required");
    } else {
        initRecognition();
    }

    function initRecognition() {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = currentLang;

        recognition.onstart = () => {
            isRunning = true;
            status.innerText = "Listening in: " + (currentLang === 'si-LK' ? 'SINHALA' : 'ENGLISH');
            status.style.borderLeftColor = "#10b981";
        };

        recognition.onresult = (event) => {
            let transcript = event.results[event.results.length - 1][0].transcript;
            output.innerText += transcript + ". ";
            output.scrollTop = output.scrollHeight;
        };

        recognition.onend = () => {
            if (isRunning) recognition.start(); // Auto-restart keep alive
        };
    }

    function switchLang(lang) {
        currentLang = lang;
        if (isRunning) {
            recognition.stop(); // Stop will trigger onend, which restarts with new lang
        }
        document.getElementById('langSi').classList.toggle('active-lang', lang === 'si-LK');
        document.getElementById('langEn').classList.toggle('active-lang', lang === 'en-US');
    }

    startBtn.onclick = () => {
        if (!isRunning) {
            recognition.start();
            startBtn.innerText = "STOP ENGINE";
        } else {
            isRunning = false;
            recognition.stop();
            startBtn.innerText = "ACTIVATE ENGINE";
        }
    };

    document.getElementById('langSi').onclick = () => switchLang('si-LK');
    document.getElementById('langEn').onclick = () => switchLang('en-US');

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        alert("Copied!");
    };
</script>

</body>
</html>
