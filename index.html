<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meeting Assistant - Dilshan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; display: flex; justify-content: space-between; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        #output { 
            border: 2px solid #e0e0e0; padding: 20px; min-height: 450px; max-height: 600px;
            overflow-y: auto; background: #fafafa; border-radius: 10px; font-size: 17px; line-height: 1.8; color: #333;
        }
        .status-bar { padding: 10px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        .recording { background: #e6f4ea; color: #1e8e3e; }
        .stopped { background: #fce8e6; color: #d93025; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: #1a73e8; color: white; }
        .btn-stop { background: #d93025; color: white; }
        .btn-clear { background: #5f6368; color: white; }
        .interim { color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Meeting Assistant <small style="font-size: 12px; color: #888;">AI Ready</small></h2>
    
    <div id="statusBar" class="status-bar stopped">Status: Ready to Start</div>
    
    <div class="controls">
        <button id="startBtn" class="btn-start">Start Assistant</button>
        <button id="stopBtn" class="btn-stop" disabled>Stop</button>
        <button id="copyBtn" style="background: #34a853; color: white;">Copy for Gemini</button>
        <button id="clearBtn" class="btn-clear">Clear All</button>
    </div>

    <div id="output" contenteditable="true">Words will appear here as you speak...</div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const output = document.getElementById('output');
    const statusBar = document.getElementById('statusBar');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    let recognition;
    let isManualStop = false;

    // Local Storage eken kalin thibba data ganna (Auto-recovery)
    if (localStorage.getItem('meeting_transcript')) {
        output.innerText = localStorage.getItem('meeting_transcript');
    }

    if (!('webkitSpeechRecognition' in window)) {
        alert("Please use Chrome Browser!");
    } else {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            statusBar.innerText = "Status: LISTENING... (System is Active)";
            statusBar.className = "status-bar recording";
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            let interimTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            if (finalTranscript) {
                // Screen ekata add karana peliya
                output.innerText += finalTranscript;
                // Browser eke save karagannawa crash unoth bera ganna
                localStorage.setItem('meeting_transcript', output.innerText);
                // Scroll to bottom
                output.scrollTop = output.scrollHeight;
            }
        };

        recognition.onend = () => {
            if (!isManualStop) {
                console.log("Auto-restarting speech recognition...");
                recognition.start();
            } else {
                statusBar.innerText = "Status: Stopped";
                statusBar.className = "status-bar stopped";
            }
        };

        recognition.onerror = (event) => {
            console.error("Speech Error:", event.error);
            if (event.error === 'no-speech') {
                statusBar.innerText = "Status: Idle (No voice detected)";
            }
        };
    }

    startBtn.onclick = () => {
        isManualStop = false;
        recognition.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
        isManualStop = true;
        recognition.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    clearBtn.onclick = () => {
        if (confirm("Are you sure you want to clear the transcript?")) {
            output.innerText = "";
            localStorage.removeItem('meeting_transcript');
        }
    };

    copyBtn.onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        alert("Transcript copied! Paste it to Gemini for minutes.");
    };
</script>

</body>
</html>
